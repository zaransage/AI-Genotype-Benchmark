<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #222; }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      min-height: 1.5em;
      color: #444;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      grid-template-rows: repeat(3, 90px);
      gap: 6px;
      margin-bottom: 1.5rem;
    }

    .cell {
      background: #fff;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 2.5rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #e8f4fd; border-color: #4a9eda; }
    .cell.taken { cursor: default; }
    .cell.x { color: #e74c3c; }
    .cell.o { color: #2980b9; }

    button {
      padding: 0.55rem 1.4rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4a9eda;
      color: #fff;
      transition: background 0.15s;
    }

    button:hover { background: #2980b9; }
    button:disabled { background: #aaa; cursor: default; }

    #error {
      color: #c0392b;
      font-size: 0.9rem;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }

    #history {
      margin-top: 2rem;
      width: 100%;
      max-width: 480px;
    }

    #history h2 { font-size: 1.2rem; margin-bottom: 0.75rem; color: #333; }

    .history-item {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0.6rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.88rem;
      color: #555;
    }

    .history-item .outcome { font-weight: bold; color: #222; }
  </style>
</head>
<body>

<h1>Tic-Tac-Toe</h1>

<div id="status">Press "New Game" to start.</div>

<div id="board">
  <!-- 9 cells injected by JS -->
</div>

<button id="new-game-btn" onclick="newGame()">New Game</button>
<div id="error"></div>

<section id="history">
  <h2>Completed Games</h2>
  <div id="history-list"><em>No completed games yet.</em></div>
</section>

<script>
  const API   = '/api/v1';
  let gameId  = null;
  let current = 'X';
  let over    = false;

  // ── board rendering ────────────────────────────────────────────────
  function buildBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.row = r;
        cell.dataset.col = c;
        cell.addEventListener('click', onCellClick);
        board.appendChild(cell);
      }
    }
  }

  function renderState(state) {
    gameId  = state.game_id;
    current = state.current_player;
    over    = state.status !== 'active';

    document.getElementById('error').textContent = '';

    // cells
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const val  = state.board[r][c];
        const cell = document.querySelector(
          `.cell[data-row="${r}"][data-col="${c}"]`
        );
        cell.textContent = val;
        cell.className   = 'cell' + (val ? ' taken ' + val.toLowerCase() : '');
      }
    }

    // status
    const statusEl = document.getElementById('status');
    if (state.status === 'active') {
      statusEl.textContent = `Player ${current}'s turn`;
    } else if (state.status === 'draw') {
      statusEl.textContent = "It's a draw!";
    } else {
      statusEl.textContent = `Player ${state.winner} wins!`;
    }

    if (over) loadHistory();
  }

  // ── events ─────────────────────────────────────────────────────────
  async function onCellClick(e) {
    if (!gameId || over) return;
    const row = parseInt(e.currentTarget.dataset.row, 10);
    const col = parseInt(e.currentTarget.dataset.col, 10);
    if (e.currentTarget.classList.contains('taken')) return;
    await makeMove(row, col);
  }

  // ── API calls ───────────────────────────────────────────────────────
  async function newGame() {
    document.getElementById('error').textContent = '';
    document.getElementById('status').textContent = 'Starting…';
    buildBoard();
    try {
      const resp  = await fetch(`${API}/games`, { method: 'POST' });
      const state = await resp.json();
      over = false;
      renderState(state);
    } catch (err) {
      document.getElementById('status').textContent = 'Failed to start game.';
    }
  }

  async function makeMove(row, col) {
    try {
      const resp = await fetch(`${API}/games/${gameId}/moves`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ player: current, row, col }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        document.getElementById('error').textContent =
          data.detail || 'Invalid move.';
        return;
      }
      renderState(data);
    } catch (err) {
      document.getElementById('error').textContent = 'Network error.';
    }
  }

  async function loadHistory() {
    try {
      const resp    = await fetch(`${API}/games/completed`);
      const records = await resp.json();
      const list    = document.getElementById('history-list');
      if (!records.length) {
        list.innerHTML = '<em>No completed games yet.</em>';
        return;
      }
      list.innerHTML = records.map(r => {
        const outcomeText =
          r.outcome === 'draw'   ? 'Draw' :
          r.outcome === 'x_wins' ? 'X wins' : 'O wins';
        return `<div class="history-item">
          <span class="outcome">${outcomeText}</span>
          &nbsp;·&nbsp;${r.moves.length} moves
          &nbsp;·&nbsp;<code>${r.game_id.slice(0, 8)}…</code>
        </div>`;
      }).join('');
    } catch (_) { /* history is decorative — ignore errors */ }
  }

  // ── init ────────────────────────────────────────────────────────────
  buildBoard();
  loadHistory();
</script>
</body>
</html>
